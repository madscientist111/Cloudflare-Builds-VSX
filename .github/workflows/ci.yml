name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Check out repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false

      - name: Set up Node.js
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: 22
          cache: npm

      - name: Install locked dependencies
        run: npm ci

      - name: Audit dependencies and registry signatures
        run: |
          npm audit --audit-level=low
          npm audit signatures

      - name: Lint, typecheck, test, and build
        run: npm run check

      - name: Test in the VS Code extension host
        run: xvfb-run -a npm run test:extension

      - name: Package a minimal VSIX
        run: npm exec -- vsce package --no-dependencies --out cloudflare-builds.vsix
